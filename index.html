<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagiOne - NGX x MagicalFuture</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff007a;
            --bg-dark: #050510;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 122, 0.05) 0%, transparent 40%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        header {
            margin-bottom: 60px;
        }

        .logo-area {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .main-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            box-shadow: 0 0 30px var(--primary);
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            letter-spacing: 0.5rem;
            margin: 10px 0;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.2rem;
        }

        /* アプリグリッド */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--glass);
            border-radius: 20px;
            padding: 30px 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .app-icon {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .app-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .app-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* フッター制作元 */
        footer {
            margin-top: 80px;
            padding: 40px;
            border-top: 1px solid var(--glass);
        }

        .brand-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            opacity: 0.8;
        }

        .brand-item img {
            height: 40px;
            filter: grayscale(1) brightness(2);
            transition: 0.3s;
        }

        .brand-item:hover img {
            filter: grayscale(0) brightness(1);
        }

        .copyright {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <img src="MagiOne.png" alt="MagiOne" class="main-icon">
        </div>
        <h1>MAGI ONE</h1>
        <div class="subtitle">BEYOND NEXT HUB</div>
    </header>

    <div class="app-grid">
        <a href="MagiSim.html" class="app-card">
            <div class="app-icon">SIM</div>
            <div class="app-name">MagiSim</div>
            <div class="app-desc">Ultimate Sports Simulation</div>
        </a>

        <a href="MagiLink.html" class="app-card">
            <div class="app-icon">LINK</div>
            <div class="app-name">MagiLink</div>
            <div class="app-desc">Next-Gen Communication</div>
        </a>

        <a href="MagiLex.html" class="app-card">
            <div class="app-icon">LEX</div>
            <div class="app-name">MagiLex</div>
            <div class="app-desc">Advanced Word Learning</div>
        </a>

        <a href="MagiArena.html" class="app-card">
            <div class="app-icon">ARENA</div>
            <div class="app-name">MagiArena</div>
            <div class="app-desc">Hyper Gaming Center</div>
        </a>
    </div>

    <footer>
        <div class="brand-logos">
            <div class="brand-item">
                <img src="NGX.jpg" alt="NGX">
            </div>
            <div class="brand-item">
                <img src="MagicalFuture.jpg" alt="MagicalFuture">
            </div>
        </div>
        <div class="copyright">© 2026 NGX / MagicalFuture. All Rights Reserved.</div>
    </footer>
</div>

</body>
</html>
